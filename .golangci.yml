linters:
  enable:
    - gosec
    - godot
    - misspell
    - stylecheck

linters-settings:
  stylecheck:
    checks: ["all", "ST1*"]

issues:
  exclude-use-default: false

output:
  # แก้ปัญหา Deprecated: เปลี่ยนจาก format เป็น formats (รองรับหลายแบบ)
  formats:
    - format: colored-line-number
  
  print-issued-lines: false
  print-linter-name: true